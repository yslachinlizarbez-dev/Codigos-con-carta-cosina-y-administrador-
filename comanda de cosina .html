<meta name='viewport' content='width=device-width, initial-scale=1'/>
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Paradita MX - Monitor de Cocina KDS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Fredoka:wght@300;400;500;600;700&display=swap');
        
        body {
            background-color: #0f172a; /* Fondo ultra oscuro para evitar fatiga visual en cocina */
            font-family: 'Fredoka', sans-serif;
            color: #f8fafc;
        }

        .mexican-font {
            font-family: 'Luckiest Guy', cursive;
            letter-spacing: 1.5px;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes pulse-red {
            0%, 100% { border-color: #ef4444; box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { border-color: #f87171; box-shadow: 0 0 15px 5px rgba(239, 68, 68, 0.2); }
        }
        .urgent-pulse {
            animation: pulse-red 2s infinite;
        }

        .toast-notification {
            animation: slideInUp 0.3s ease-out forwards;
        }
        @keyframes slideInUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- 1. INICIO DE SESIÓN SEGURO PARA COCINA -->
    <div id="auth-gateway" class="fixed inset-0 bg-slate-950 z-[300] flex items-center justify-center p-4">
        <div class="bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-8 border-4 border-amber-500 shadow-2xl text-center">
            <div class="w-16 h-16 bg-amber-500/10 rounded-full flex items-center justify-center mx-auto mb-3">
                <span class="text-3xl">🧑‍🍳</span>
            </div>
            <h3 class="mexican-font text-2xl text-white mb-1">LA PARADITA MX</h3>
            <p class="text-[10px] text-amber-500 font-black uppercase tracking-wider mb-6">Monitor de Cocina Autorizado</p>
            
            <form id="login-form" onsubmit="window.handleKitchenLogin(event)" class="space-y-4 text-left">
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-400 mb-1">Correo de Cocina</label>
                    <input type="email" id="auth-email" required placeholder="cocina@laparadita.com" class="w-full px-4 py-3 bg-slate-800 border-2 border-slate-700 rounded-2xl text-sm outline-none text-white focus:border-amber-500 transition-colors font-semibold">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-400 mb-1">Contraseña</label>
                    <input type="password" id="auth-password" required placeholder="••••••••" class="w-full px-4 py-3 bg-slate-800 border-2 border-slate-700 rounded-2xl text-sm outline-none text-white focus:border-amber-500 transition-colors font-semibold">
                </div>
                <button type="submit" id="auth-submit-btn" class="w-full bg-amber-500 text-slate-950 font-black py-4 rounded-2xl text-xs uppercase tracking-widest shadow-md hover:bg-amber-400 transition-colors mt-2">
                    Ingresar a Cocina
                </button>
            </form>
            <p id="auth-error-msg" class="text-xs text-red-500 font-bold uppercase tracking-wide mt-4 h-4 opacity-0 transition-opacity duration-300">Credenciales Incorrectas</p>
        </div>
    </div>

    <!-- 2. CABECERA PRINCIPAL -->
    <header class="bg-slate-900 border-b border-slate-800 py-3 px-6 flex justify-between items-center flex-shrink-0">
        <div class="flex items-center gap-3">
            <span class="text-3xl">🧑‍🍳</span>
            <div class="text-left">
                <h1 class="mexican-font text-xl text-amber-500">COMANDAS DIGITALES</h1>
                <p class="text-[9px] uppercase font-black tracking-widest text-slate-400">La Paradita MX - Mazamari</p>
            </div>
        </div>
        
        <!-- Indicadores de Caja -->
        <div class="flex items-center gap-2">
            <button onclick="window.enableAudio()" id="audio-enable-btn" class="bg-amber-500/20 text-amber-400 border border-amber-500/30 text-[10px] font-black px-3.5 py-1.5 rounded-xl flex items-center gap-1.5">
                <i class="fas fa-volume-up"></i> SONIDO ACTIVO
            </button>
            <span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 text-[10px] font-black px-3.5 py-1.5 rounded-xl flex items-center gap-1.5">
                <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span> CONECTADO
            </span>
            <button onclick="window.handleLogout()" class="bg-slate-800 text-slate-400 hover:text-red-400 hover:bg-red-500/10 p-2 rounded-xl text-xs transition-colors"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <!-- 3. BARRA DE FILTROS Y ESTADÍSTICAS RÁPIDAS -->
    <div class="bg-slate-900/60 border-b border-slate-800/80 px-6 py-3 flex flex-wrap justify-between items-center gap-3 flex-shrink-0">
        <!-- Filtros -->
        <div class="flex gap-2 text-xs font-bold">
            <button onclick="window.setFilter('todos')" id="filter-todos" class="px-4 py-2 rounded-xl bg-amber-500 text-slate-950 font-black uppercase">Todos</button>
            <button onclick="window.setFilter('pendiente')" id="filter-pendiente" class="px-4 py-2 rounded-xl bg-slate-800 text-slate-300 font-bold uppercase hover:bg-slate-750">Pendientes (<span id="count-pendiente">0</span>)</button>
            <button onclick="window.setFilter('preparando')" id="filter-preparando" class="px-4 py-2 rounded-xl bg-slate-800 text-slate-300 font-bold uppercase hover:bg-slate-750">En Cocina (<span id="count-preparando">0</span>)</button>
            <button onclick="window.setFilter('listo')" id="filter-listo" class="px-4 py-2 rounded-xl bg-slate-800 text-slate-300 font-bold uppercase hover:bg-slate-750">Listos (<span id="count-listo">0</span>)</button>
        </div>

        <!-- Indicador de Historial -->
        <button onclick="window.toggleHistorialModal()" class="bg-slate-800 text-slate-300 px-4 py-2 rounded-xl text-xs font-black uppercase flex items-center gap-2 border border-slate-700 hover:bg-slate-750">
            <i class="fas fa-history text-amber-500"></i> Historial del Día
        </button>
    </div>

    <!-- 4. CONTENEDOR DE COMANDAS ACTIVERAS (SCROLL HORIZONTAL PARA TABLET) -->
    <main class="flex-1 overflow-x-auto p-6 flex gap-6 items-start no-scrollbar bg-slate-950" id="comandas-grid">
        <!-- Se inyecta dinámicamente -->
        <div class="w-full flex flex-col items-center justify-center py-24 text-slate-500 space-y-3">
            <span class="text-6xl">🌮</span>
            <p class="font-black text-sm uppercase tracking-widest">¡Que empiece la fiesta! Esperando comas...</p>
        </div>
    </main>

    <!-- MODAL: HISTORIAL DE PEDIDOS ENTREGADOS HOY -->
    <div id="historial-modal" class="fixed inset-0 bg-black/90 z-[250] hidden p-4 flex items-center justify-center">
        <div class="bg-slate-900 w-full max-w-lg rounded-[2.5rem] border-4 border-slate-800 shadow-2xl flex flex-col max-h-[85vh]">
            <div class="p-6 border-b border-slate-800 flex justify-between items-center">
                <div class="flex items-center gap-2.5">
                    <span class="text-2xl">📋</span>
                    <h3 class="mexican-font text-xl text-white">PEDIDOS ENTREGADOS HOY</h3>
                </div>
                <button onclick="window.toggleHistorialModal()" class="text-slate-400 hover:text-white text-2xl font-bold">×</button>
            </div>
            <div id="historial-list" class="p-6 overflow-y-auto flex-1 space-y-3 no-scrollbar">
                <!-- Cargado con JS -->
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed top-4 left-4 right-4 z-[350] space-y-2 pointer-events-none flex flex-col items-center"></div>

    <!-- CONTROLADORES CORE CON FIREBASE EN TIEMPO REAL -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const appId = 'la-paradita-mx-admin';
        const firebaseConfig = {
            apiKey: "AIzaSyAuH6gyoD-TsTuJICReJ0HecKfYmPa2E7k",
            authDomain: "la-paradita-mx.firebaseapp.com",
            projectId: "la-paradita-mx",
            storageBucket: "la-paradita-mx.firebasestorage.app",
            messagingSenderId: "464811416726",
            appId: "1:464811416726:web:7f41bc8450e2465843f6b7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ventasCollectionPath = collection(db, 'artifacts', appId, 'public', 'data', 'ventas');

        let activeOrders = [];
        let audioAllowed = false;
        let knownOrderIds = new Set();
        window.activeFilter = 'todos';

        // --- AUTENTICACIÓN SEGURA DE COCINA ---
        window.handleKitchenLogin = async function(e) {
            e.preventDefault();
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            const btn = document.getElementById('auth-submit-btn');
            const errorMsg = document.getElementById('auth-error-msg');
            
            btn.disabled = true;
            btn.innerText = "Verificando...";
            errorMsg.classList.add('opacity-0');

            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (err) {
                errorMsg.classList.remove('opacity-0');
                btn.disabled = false;
                btn.innerText = "Ingresar a Cocina";
            }
        };

        window.handleLogout = async function() {
            if (confirm("¿Seguro de salir del monitor de cocina?")) {
                await signOut(auth);
                location.reload();
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-gateway').classList.add('hidden');
                window.startKitchenSubscription();
                window.showToast("🛠️ Monitor de Cocina Activo");
            } else {
                document.getElementById('auth-gateway').classList.remove('hidden');
            }
        });

        // --- SISTEMA DE ALARMA DE SONIDO (WEB AUDIO API) ---
        window.enableAudio = function() {
            audioAllowed = true;
            const btn = document.getElementById('audio-enable-btn');
            btn.className = "bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 text-[10px] font-black px-3.5 py-1.5 rounded-xl flex items-center gap-1.5";
            btn.innerHTML = `<i class="fas fa-bell"></i> AUDIO LISTO`;
            window.playBeepSound();
        };

        window.playBeepSound = function() {
            if (!audioAllowed) return;
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = 'sine';
                // Timbre doble característico de campana de cocina
                osc.frequency.setValueAtTime(659.25, ctx.currentTime); // E5
                osc.frequency.setValueAtTime(880.00, ctx.currentTime + 0.12); // A5
                
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.35);
            } catch (e) {
                console.log("Audio bloqueado por navegador", e);
            }
        };

        // --- MUDAR DATOS EN VIVO DESDE FIREBASE ---
        window.startKitchenSubscription = function() {
            onSnapshot(ventasCollectionPath, (snapshot) => {
                const todayStr = new Date().toISOString().split('T')[0];
                const list = [];
                let hasNewPending = false;

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    // Solo capturar pedidos de hoy
                    if (data.date && data.date.startsWith(todayStr)) {
                        // El POS puede guardar con estado_cocina. Si no tiene, por defecto es 'pendiente'
                        const estado = data.estado_cocina || 'pendiente';
                        list.push({ id: doc.id, estado_cocina: estado, ...data });

                        // Detectar si ingresó un nuevo pedido pendiente para sonar la campana
                        if (estado === 'pendiente' && !knownOrderIds.has(doc.id)) {
                            hasNewPending = true;
                            knownOrderIds.add(doc.id);
                        }
                    }
                });

                // Ordenar más viejos primero (FIFO)
                list.sort((a, b) => new Date(a.date) - new Date(b.date));
                activeOrders = list;

                if (hasNewPending) {
                    window.playBeepSound();
                    window.showToast("🛎️ ¡NUEVO PEDIDO EN COLA!");
                }

                // Guardar IDs conocidos para evitar repetir alarmas
                list.forEach(o => knownOrderIds.add(o.id));

                window.renderComandas();
                window.updateStatistics();
            });
        };

        // --- RENDERIZADO DEL MONITOR KDS (ESTILO TARJETAS GRANDES) ---
        window.renderComandas = function() {
            const container = document.getElementById('comandas-grid');
            if (!container) return;

            // Filtrar según botón seleccionado
            let filtered = activeOrders.filter(o => o.estado_cocina !== 'entregado'); // El historial maneja los entregados

            if (window.activeFilter !== 'todos') {
                filtered = filtered.filter(o => o.estado_cocina === window.activeFilter);
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="w-full flex flex-col items-center justify-center py-24 text-slate-600 space-y-3">
                        <span class="text-6xl">🙌</span>
                        <p class="font-black text-sm uppercase tracking-widest text-slate-500">¡Sin comandas en esta sección!</p>
                    </div>`;
                return;
            }

            container.innerHTML = filtered.map(order => {
                const items = order.cart || [];
                const clientName = (order.customerName || "GENERAL").toUpperCase();
                const tableInfo = order.orderTypeStr || "PRESTADO";
                const dateObj = new Date(order.date);
                
                // Color y Texto del Estado
                let stateBadge = "";
                let actionBtn = "";
                if (order.estado_cocina === 'pendiente') {
                    stateBadge = `<span class="bg-red-500/10 text-red-400 border border-red-500/20 text-[10px] font-black px-3 py-1 rounded-full uppercase">🛑 Pendiente</span>`;
                    actionBtn = `
                        <button onclick="window.updateOrderState('${order.id}', 'preparando')" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-black py-4 rounded-2xl text-xs uppercase tracking-widest shadow-md transition-colors flex items-center justify-center gap-2">
                            <i class="fas fa-fire"></i> EMPEZAR PREPARACIÓN
                        </button>`;
                } else if (order.estado_cocina === 'preparando') {
                    stateBadge = `<span class="bg-amber-500/10 text-amber-400 border border-amber-500/20 text-[10px] font-black px-3 py-1 rounded-full uppercase">🧑‍🍳 En Cocina</span>`;
                    actionBtn = `
                        <button onclick="window.updateOrderState('${order.id}', 'listo')" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-4 rounded-2xl text-xs uppercase tracking-widest shadow-md transition-colors flex items-center justify-center gap-2">
                            <i class="fas fa-check-double"></i> ¡PLATOS LISTOS!
                        </button>`;
                } else if (order.estado_cocina === 'listo') {
                    stateBadge = `<span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 text-[10px] font-black px-3 py-1 rounded-full uppercase">✅ Por Servir</span>`;
                    actionBtn = `
                        <button onclick="window.updateOrderState('${order.id}', 'entregado')" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-black py-4 rounded-2xl text-xs uppercase tracking-widest shadow-md transition-colors flex items-center justify-center gap-2 border border-slate-700">
                            <i class="fas fa-concierge-bell"></i> ENTREGADO A MESA
                        </button>`;
                }

                return `
                    <div id="card-${order.id}" class="w-80 bg-slate-900 border-2 border-slate-800 rounded-[2.5rem] flex flex-shrink-0 flex-col overflow-hidden shadow-2xl min-h-[420px] max-h-[550px]" data-timestamp="${dateObj.getTime()}">
                        <!-- Cabecera de la Tarjeta -->
                        <div class="p-5 border-b border-slate-800 bg-slate-900/60 flex flex-col gap-2">
                            <div class="flex justify-between items-start">
                                <h4 class="mexican-font text-xl text-amber-500 leading-none">${tableInfo}</h4>
                                <span class="text-[10px] font-bold text-slate-400"><i class="far fa-clock mr-1"></i>${dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                            </div>
                            <div class="flex justify-between items-center mt-1">
                                <p class="text-xs font-black uppercase text-white truncate max-w-[150px]"><i class="fas fa-user text-amber-500 text-[10px] mr-1.5"></i>${clientName}</p>
                                ${stateBadge}
                            </div>
                        </div>

                        <!-- Semáforo de Tiempo Transcurrido -->
                        <div class="bg-slate-950 px-5 py-2 border-b border-slate-800 flex justify-between items-center text-[10px] font-black uppercase">
                            <span class="text-slate-500">Transcurrido:</span>
                            <span class="timer-pill px-3 py-0.5 rounded-full font-black tracking-wider bg-emerald-500/10 text-emerald-400" id="timer-${order.id}">0m</span>
                        </div>

                        <!-- Lista de platos (Cuerpo) -->
                        <div class="flex-1 p-5 overflow-y-auto space-y-3 bg-slate-900/40 no-scrollbar">
                            ${items.length > 0 ? items.map(item => {
                                // Separar modificaciones del nombre principal
                                const hasSpecs = item.name.includes('(');
                                let mainName = item.name;
                                let specsText = "";
                                if (hasSpecs) {
                                    const parts = item.name.split('(');
                                    mainName = parts[0].trim();
                                    specsText = parts[1].replace(')', '').trim();
                                }

                                return `
                                    <div class="flex items-start gap-2 border-b border-slate-800/40 pb-2">
                                        <span class="bg-amber-500/10 text-amber-400 text-xs font-black w-6 h-6 rounded-lg flex items-center justify-center flex-shrink-0">${item.qty}x</span>
                                        <div class="text-left">
                                            <p class="text-xs font-black text-slate-200 uppercase leading-tight">${mainName}</p>
                                            ${specsText ? `<p class="text-[9px] text-mex-red font-black uppercase tracking-wider mt-0.5 bg-red-500/5 px-1.5 py-0.5 rounded border border-red-500/10 inline-block"><i class="fas fa-pepper-hot mr-1"></i>${specsText}</p>` : ''}
                                        </div>
                                    </div>`;
                            }).join('') : `
                                <div class="flex items-start gap-2">
                                    <span class="bg-amber-500/10 text-amber-400 text-xs font-bold w-6 h-6 rounded-lg flex items-center justify-center flex-shrink-0">1x</span>
                                    <p class="text-xs font-bold text-slate-200 uppercase leading-tight text-left">${order.descripcion}</p>
                                </div>
                            `}
                        </div>

                        <!-- Botonera de Acción Fija abajo -->
                        <div class="p-4 border-t border-slate-800 bg-slate-900/60 flex-shrink-0">
                            ${actionBtn}
                        </div>
                    </div>`;
            }).join('');

            // Iniciar conteo de tiempos del semáforo inmediatamente
            window.updateTimers();
        };

        // --- CALCULAR SEMÁFORO DE TIEMPO (VERDE, AMARILLO Y ROJO PARPADEANTE) ---
        window.updateTimers = function() {
            const now = Date.now();
            document.querySelectorAll('[id^="card-"]').forEach(card => {
                const orderId = card.id.replace('card-', '');
                const timestamp = parseInt(card.dataset.timestamp);
                const timerElement = document.getElementById(`timer-${orderId}`);
                
                if (timerElement) {
                    const diffMs = now - timestamp;
                    const diffMins = Math.floor(diffMs / 60000);
                    
                    timerElement.innerText = `${diffMins}m`;

                    // Lógica del semáforo:
                    // Verde: < 5 min
                    // Amarillo: 5 a 10 min
                    // Rojo intermitente de alerta: > 10 min
                    if (diffMins < 5) {
                        timerElement.className = "timer-pill px-3 py-0.5 rounded-full font-black tracking-wider bg-emerald-500/10 text-emerald-400";
                        card.classList.remove('urgent-pulse', 'border-amber-500/50');
                    } else if (diffMins >= 5 && diffMins < 10) {
                        timerElement.className = "timer-pill px-3 py-0.5 rounded-full font-black tracking-wider bg-amber-500/10 text-amber-400";
                        card.classList.remove('urgent-pulse');
                        card.classList.add('border-amber-500/50');
                    } else {
                        timerElement.className = "timer-pill px-3 py-0.5 rounded-full font-black tracking-wider bg-red-500/20 text-red-400 animate-pulse";
                        card.classList.remove('border-amber-500/50');
                        card.classList.add('urgent-pulse');
                    }
                }
            });
        };

        // Correr actualización de cronómetros cada 10 segundos
        setInterval(window.updateTimers, 10000);

        // --- ACTUALIZAR ESTADO DE UN PEDIDO ---
        window.updateOrderState = async function(orderId, newState) {
            try {
                await updateDoc(doc(ventasCollectionPath, orderId), {
                    estado_cocina: newState
                });
                window.showToast(`✅ Pedido actualizado a ${newState.toUpperCase()}`);
            } catch (err) {
                window.showToast("Error de conexión al cambiar estado");
            }
        };

        // --- FILTROS INTELIGENTES ---
        window.setFilter = function(filterName) {
            window.activeFilter = filterName;
            ['todos', 'pendiente', 'preparando', 'listo'].forEach(f => {
                const btn = document.getElementById(`filter-${f}`);
                if (btn) {
                    if (f === filterName) {
                        btn.className = "px-4 py-2 rounded-xl bg-amber-500 text-slate-950 font-black uppercase transition-all shadow-md";
                    } else {
                        btn.className = "px-4 py-2 rounded-xl bg-slate-800 text-slate-300 font-bold uppercase hover:bg-slate-750 transition-all";
                    }
                }
            });
            window.renderComandas();
        };

        // --- ESTADÍSTICAS RÁPIDAS (CONTADORES DE BARRA) ---
        window.updateStatistics = function() {
            const counts = { pendiente: 0, preparando: 0, listo: 0 };
            activeOrders.forEach(o => {
                if (counts[o.estado_cocina] !== undefined) {
                    counts[o.estado_cocina]++;
                }
            });

            document.getElementById('count-pendiente').innerText = counts.pendiente;
            document.getElementById('count-preparando').innerText = counts.preparando;
            document.getElementById('count-listo').innerText = counts.listo;
        };

        // --- MODAL: HISTORIAL DEL DÍA ---
        window.toggleHistorialModal = function() {
            const modal = document.getElementById('historial-modal');
            modal.classList.toggle('hidden');
            if (!modal.classList.contains('hidden')) {
                window.renderHistorial();
            }
        };

        window.renderHistorial = function() {
            const container = document.getElementById('historial-list');
            if (!container) return;

            const entregados = activeOrders.filter(o => o.estado_cocina === 'entregado');

            if (entregados.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-500 py-10 font-bold text-xs uppercase">Aún no se han despachado pedidos hoy.</p>`;
                return;
            }

            // Mostrar los más recientes entregados arriba
            entregados.sort((a,b) => new Date(b.date) - new Date(a.date));

            container.innerHTML = entregados.map(o => {
                const dateObj = new Date(o.date);
                const itemsStr = o.cart ? o.cart.map(i => `${i.qty}x ${i.name.split('(')[0]}`).join(', ') : o.descripcion;

                return `
                    <div class="p-4 bg-slate-800/50 border border-slate-800 rounded-2xl flex justify-between items-center text-xs font-semibold text-left">
                        <div class="min-w-0 flex-1 pr-3">
                            <p class="font-black text-slate-200 uppercase truncate">${itemsStr}</p>
                            <span class="text-[9px] bg-slate-800 text-slate-400 px-2 py-0.5 rounded font-bold uppercase tracking-wider block mt-1 inline-block">${o.orderTypeStr}</span>
                            <span class="text-[9px] text-slate-500 ml-1 font-bold"><i class="far fa-clock mr-1"></i>${dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                        </div>
                        <button onclick="window.updateOrderState('${o.id}', 'listo')" class="bg-amber-500/20 text-amber-400 border border-amber-500/30 px-3 py-2 rounded-xl text-[10px] font-black uppercase flex-shrink-0 transition-transform active:scale-95" title="Mandar de vuelta al monitor">
                            <i class="fas fa-undo"></i> REABRIR
                        </button>
                    </div>`;
            }).join('');
        };

        // --- TOAST NOTIFICATIONS ---
        window.showToast = function(text) {
            const container = document.getElementById('toast-container');
            if(!container) return;
            const toast = document.createElement('div');
            toast.className = "toast-notification bg-slate-800 text-white font-bold text-[11px] uppercase px-5 py-3 rounded-2xl shadow-xl flex items-center gap-2 border border-slate-700 pointer-events-auto";
            toast.innerHTML = `<span class="text-amber-500">🛎️</span> <span>${text}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 3000);
        };
    </script>
</body>
</html>
